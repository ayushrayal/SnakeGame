<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake-Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="infos">
                <h3>High Score : <span id="highscore">00</span></h3>
                <h3>Score : <span id="score">00</span></h3>
                <h3>Time : <span id="time">00:00</span></h3>
            </div>
            <div class="board">   
            </div>
        </section>
        <div class="modal">
            <div class="start-game">
                <h3>Welcome to the snake game!</h3>
                <button class="btn start-btn">Start Game</button>
            </div>
             <div class="game-over">
                <h3></h3>
                <div class="btn restart-btn">Restart</div>
            </div>
        </div>

    </main>
    <script src="script.js"></script>
</body>
</html>
